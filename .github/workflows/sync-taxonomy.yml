name: Sync taxonomy

on:
  push:
    paths:
      - "problems/**"
      - "scripts/sync_taxonomy.py"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync script
        run: python scripts/sync_taxonomy.py

      - name: Commit changes if any
        run: |
          git config user.name "taxonomy-bot"
          git config user.email "taxonomy-bot@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-sync taxonomy"
          git push